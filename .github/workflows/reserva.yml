name: Reserva automática

on:
  schedule:
    - cron: '0 13 * * 0'  # Domingo 10:00 Uruguay (UTC-3 → 13:00 UTC)
    
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install

      - name: Run script
        run: node weekReservaEnfoque.js
        env:
          URL_BASE: https://api-agenda.enfoqueweb.uy